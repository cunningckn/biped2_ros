controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters: {}

joint_trajectory_controller:
  ros__parameters:
    joints:
      - LeftHipYaw
      - LeftHipRoll
      - LeftHipPitch
      - LeftKneePitch
      - LeftAnklePitch
      - RightHipYaw
      - RightHipRoll
      - RightHipPitch
      - RightKneePitch
      - RightAnklePitch
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
